experiment:
  wandb: True
  fintune: False
  criterion: supervised
  data_type: supervised
  project: supervised_parallel
  name: decouple_only
  seed: 42
  output_dir: /public/home/zhangshikang/project/DATA/models
  checkpoint: None
  device: cuda
dataset:
  __file__: config/data/pannuke.yaml
  train:
    __file__: config/data/pannuke.yaml
    fold: fold3
  val:
    __file__: config/data/pannuke.yaml
    fold: fold1
  test:
    __file__: config/data/pannuke.yaml
    fold: fold2
transforms:
  normalize:
    mean: [0.70478431, 0.57330757, 0.74134993]
    std: [0.1786614, 0.22592805, 0.19027899]
  augmentations:
    - name: elastic
      p: 0.2
      alpha: 0.5
      sigma: 0.25
    - name: hflip
      p: 0.5
    - name: vflip
      p: 0.5
    - name: blur
      p: 0.2
      kernel_size: 9
      sigma: [0.2, 1.0]
    - name: cjitter
      p: 0.2
      brightness: 0.25
      contrast: 0.1
      saturation: 0.25
      hue: 0.05
model:
  __file__: config/model/decouple.yaml
  backbone:
    __file__: config/backbone/r50_4lvl.yaml
optimizer:
  epochs: 100
  weight_decay: 0.0001
  clip_max_norm: 0.1
  start_saving_epoch: 80
  save_per_epoch: 10
  lr_backbone: 0.000008
  lr: 0.00008
  num_warmup_steps: 600
  # lr_drop: 40
  # lr_drop_factor: 0.1
matcher:
  __file__: config/base/matcher.yaml
loss:
  __file__: config/base/loss.yaml
loader:
  train:
    batch_size: 16
    num_workers: 1
    shuffle: True
    drop_last: True
  val:
    batch_size: 16
    num_workers: 1
    shuffle: False
    drop_last: True
  test:
    batch_size: 8
    num_workers: 1
    shuffle: False
    drop_last: False